# Frontend nginx config: serves the built Vite bundle and reverse-
# proxies /api (HTTP) + /ws (WebSocket) to the backend container.
# Mirrors the dev-server proxy rules in vite.config.ts.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # Static assets — long cache, hashed filenames invalidate themselves.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket endpoint — must come before /api so the upgrade headers
    # land on the websocket location, not the generic API proxy.
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WS connections are long-lived; don't time them out at 60s default.
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Some backtest / dataset endpoints stream for several minutes.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # SPA fallback — any unmatched path serves index.html so React
    # Router can resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
