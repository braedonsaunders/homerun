name: Publish Docker images

# Builds the backend + frontend images and publishes to GHCR.
#
# Triggers:
#   - push to main → tags ``latest`` and the short commit sha
#   - push of a ``v*`` tag → tags the version (e.g. ``v1.2.3``) plus
#     ``latest`` for that release
#   - manual run via workflow_dispatch
#
# Single-arch (linux/amd64) for the MVP — adding arm64 later means
# enabling buildx + adding ``platforms: linux/amd64,linux/arm64``,
# which roughly doubles build time.  Apple Silicon users can build
# locally with ``docker compose build`` until then.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
            image: ghcr.io/${{ github.repository_owner }}/homerun-backend
          - component: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository_owner }}/homerun-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
